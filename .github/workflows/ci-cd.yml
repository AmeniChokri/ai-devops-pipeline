name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, ai-integration ]
  pull_request:
    branches: [ main ]

env:
  AI_IMAGE: ghcr.io/amenichokri/ai-devops-pipeline-ai:latest
  AI_PUBLIC_URL: https://nonskeptical-jerald-nonformalistic.ngrok-free.dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        pip install -r app/requirements.txt
        
    - name: Run tests
      run: |
        cd tests
        python -m pytest -v

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set lowercase repository name
      run: |
        echo "LOWERCASE_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}
        
    - name: Verify AI directory structure
      run: |
        echo "Checking AI directory structure..."
        ls -la ai/ || echo "ai directory not found"
        ls -la ai/src/ || echo "src directory not found"
        ls -la ai/models/ || echo "models directory not found"
        echo "✅ Directory check complete"
        
    - name: Build and push app Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/${{ env.LOWERCASE_REPO }}:latest
        
    - name: Build and push AI service Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./ai
        file: ./ai/Dockerfile
        push: true
        tags: ${{ env.AI_IMAGE }}

  security-scan:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Install Trivy
      run: |
        wget https://github.com/aquasecurity/trivy/releases/download/v0.49.1/trivy_0.49.1_Linux-64bit.deb
        sudo dpkg -i trivy_0.49.1_Linux-64bit.deb
        
    - name: Run Trivy vulnerability scanner on Docker image
      run: |
        docker pull ghcr.io/${{ env.LOWERCASE_REPO }}:latest
        trivy image --severity HIGH,CRITICAL --exit-code 1 ghcr.io/${{ env.LOWERCASE_REPO }}:latest || true
        
    - name: Run Trivy filesystem scan (Code vulnerabilities)
      run: |
        trivy fs --severity HIGH,CRITICAL --exit-code 1 . || true
        
    - name: Run Snyk security scan (Dependencies)
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      continue-on-error: true
      
    - name: Install and run GitLeaks (Secrets detection)
      run: |
        wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
        tar xzf gitleaks_8.18.0_linux_x64.tar.gz
        sudo mv gitleaks /usr/local/bin/
        gitleaks detect --source . --verbose || true
        
    - name: Security scan summary
      if: always()
      run: |
        echo "════════════════════════════════════════"
        echo "    SECURITY SCAN SUMMARY"
        echo "════════════════════════════════════════"
        echo "✅ Trivy Container Scan: Completed"
        echo "✅ Trivy Filesystem Scan: Completed"
        echo "✅ Snyk Dependency Scan: Completed"
        echo "✅ GitLeaks Secrets Scan: Completed"
        echo "════════════════════════════════════════"

  check-ai-risk:
    needs: [build-and-push, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      risk_score: ${{ steps.risk.outputs.risk_score }}
      should_rollback: ${{ steps.risk.outputs.should_rollback }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Install jq and bc
      run: sudo apt-get update && sudo apt-get install -y jq bc
      
    - name: Call AI service for REAL risk assessment
      id: risk
      env:
        AI_PUBLIC_URL: ${{ env.AI_PUBLIC_URL }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        echo "🔍 Getting REAL risk assessment from AI service at $AI_PUBLIC_URL..."
        
        RESPONSE=$(curl -s -X POST ${AI_PUBLIC_URL}/predict \
          -H "Content-Type: application/json" \
          -H "ngrok-skip-browser-warning: true" \
          -d '{}')
        
        RISK_SCORE=$(echo $RESPONSE | jq -r '.risk_score')
        IS_ANOMALY=$(echo $RESPONSE | jq -r '.is_anomaly')
        RECOMMENDATION=$(echo $RESPONSE | jq -r '.recommendation')
        CPU=$(echo $RESPONSE | jq -r '.metrics_used.cpu_usage')
        MEMORY=$(echo $RESPONSE | jq -r '.metrics_used.memory_usage')
        REQUEST_RATE=$(echo $RESPONSE | jq -r '.metrics_used.request_rate')
        ERROR_RATE=$(echo $RESPONSE | jq -r '.metrics_used.error_rate')
        COMBINED=$(echo $RESPONSE | jq -r '.metrics_used.combined_value')
        
        echo "risk_score=$RISK_SCORE" >> $GITHUB_OUTPUT
        echo "📊 Risk Score: $RISK_SCORE%"
        
        if (( $(echo "$RISK_SCORE > 90" | bc -l) )); then
          echo "should_rollback=true" >> $GITHUB_OUTPUT
          STATUS="🔴 BLOCKED - Auto-rollback triggered"
          STATUS_COLOR="red"
          ACTION="ROLLBACK"
        elif (( $(echo "$RISK_SCORE > 70" | bc -l) )); then
          echo "should_rollback=false" >> $GITHUB_OUTPUT
          STATUS="🟡 WARNING - Manual Review Recommended"
          STATUS_COLOR="orange"
          ACTION="WARNING"
        else
          echo "should_rollback=false" >> $GITHUB_OUTPUT
          STATUS="🟢 APPROVED - Safe to Deploy"
          STATUS_COLOR="green"
          ACTION="APPROVE"
        fi
        
        if (( $(echo "$RISK_SCORE > 70" | bc -l) )); then
          cat << EOF > email_body.txt
        From: DevOps AI Pipeline <${EMAIL_USER}>
        To: amenichokri2002@gmail.com
        Subject: [DevOps Alert] AI Risk Assessment - Score: ${RISK_SCORE}% - Action: ${ACTION}
        MIME-Version: 1.0
        Content-Type: text/html; charset=utf-8
        
        <html>
        <body style="font-family: Arial, sans-serif;">
        <h2>🤖 AI DevOps Risk Assessment Report</h2>
        <hr>
        <h3>Risk Score: <span style="color: ${STATUS_COLOR};">${RISK_SCORE}%</span></h3>
        <p><strong>Status:</strong> ${STATUS}</p>
        <p><strong>Action Taken:</strong> ${ACTION}</p>
        
        <h3>📈 Metrics Analyzed:</h3>
        <ul>
          <li><strong>CPU Usage:</strong> ${CPU}%</li>
          <li><strong>Memory Usage:</strong> ${MEMORY}%</li>
          <li><strong>Request Rate:</strong> ${REQUEST_RATE}/s</li>
          <li><strong>Error Rate:</strong> ${ERROR_RATE}%</li>
          <li><strong>Combined Score:</strong> ${COMBINED}</li>
        </ul>
        
        <h3>🔍 Anomaly Detected:</h3>
        <p>${IS_ANOMALY}</p>
        
        <h3>💬 AI Recommendation:</h3>
        <p>${RECOMMENDATION}</p>
        
        <h3>📋 Deployment Information:</h3>
        <ul>
          <li><strong>Timestamp:</strong> $(date)</li>
          <li><strong>Commit SHA:</strong> ${{ github.sha }}</li>
          <li><strong>Author:</strong> ${{ github.actor }}</li>
          <li><strong>Repository:</strong> ${{ github.repository }}</li>
          <li><strong>Branch:</strong> ${{ github.ref_name }}</li>
          <li><strong>Run URL:</strong> <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run</a></li>
        </ul>
        <hr>
        <p><small>This is an automated message from your AI DevOps Pipeline.</small></p>
        </body>
        </html>
        EOF
          
          curl --ssl-reqd \
            --url 'smtps://smtp.gmail.com:465' \
            --user "${EMAIL_USER}:${EMAIL_PASSWORD}" \
            --mail-from "${EMAIL_USER}" \
            --mail-rcpt "amenichokri2002@gmail.com" \
            --upload-file email_body.txt
          
          echo "📧 Email notification sent"
        fi
        
        if (( $(echo "$RISK_SCORE > 90" | bc -l) )); then
          echo "❌ HIGH RISK! Auto-rollback will be triggered"
          exit 1
        elif (( $(echo "$RISK_SCORE > 70" | bc -l) )); then
          echo "⚠️ MODERATE RISK. Proceeding with warning."
        else
          echo "✅ LOW RISK. Proceeding with deployment."
        fi

  deploy-to-kind:
    needs: [build-and-push, security-scan, check-ai-risk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set lowercase repository name
      run: |
        echo "LOWERCASE_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}
      
    - name: Create Kind Kubernetes Cluster
      uses: helm/kind-action@v1.5.0
      with:
        cluster_name: kind
        wait: 180s
        version: v0.20.0
      
    - name: Wait for cluster to be ready
      run: |
        kubectl wait --for=condition=ready nodes --all --timeout=60s
        sleep 10
      
    - name: Pull app Docker image from GHCR
      run: |
        docker pull ghcr.io/${{ env.LOWERCASE_REPO }}:latest
      
    - name: Pull AI Docker image from GHCR
      run: |
        docker pull ${{ env.AI_IMAGE }}
      
    - name: Load app image into Kind
      run: |
        kind load docker-image ghcr.io/${{ env.LOWERCASE_REPO }}:latest --name kind
        echo "✅ App image loaded into Kind"
      
    - name: Load AI image into Kind
      run: |
        kind load docker-image ${{ env.AI_IMAGE }} --name kind
        echo "✅ AI image loaded into Kind"
      
    - name: Verify images are loaded
      run: |
        echo "📦 Checking loaded images in Kind cluster..."
        docker exec kind-control-plane crictl images | grep -E "ai-devops|ai-devops-pipeline-ai" || echo "⚠️ Some images not found in crictl"
      
    - name: Deploy applications to Kind Cluster
      id: deploy
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/ai-service.yaml
        
        echo "⏳ Waiting for app deployment to be ready..."
        kubectl rollout status deployment/sfe-devops-app --timeout=180s
        
        echo "⏳ Waiting for AI deployment to be ready..."
        kubectl rollout status deployment/ai-anomaly-detection --timeout=180s
        
        echo "📊 Pod Status:"
        kubectl get pods
        
        echo "✅ Deployment completed"
      
    - name: Post-deployment AI health check
      if: success()
      env:
        AI_PUBLIC_URL: ${{ env.AI_PUBLIC_URL }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        echo "🔍 Running post-deployment AI health check..."
        sleep 30
        
        RESPONSE=$(curl -s -X POST ${AI_PUBLIC_URL}/predict \
          -H "Content-Type: application/json" \
          -H "ngrok-skip-browser-warning: true" \
          -d '{}')
        
        POST_RISK=$(echo $RESPONSE | jq -r '.risk_score')
        echo "Post-deployment risk score: $POST_RISK%"
        
        if (( $(echo "$POST_RISK > 90" | bc -l) )); then
          echo "🚨 Post-deployment risk is HIGH! Triggering rollback..."
          echo "rollback_needed=true" >> $GITHUB_ENV
        else
          echo "✅ Post-deployment risk is acceptable"
          echo "rollback_needed=false" >> $GITHUB_ENV
        fi
      
    - name: Auto-Rollback to Previous Version
      if: failure() || env.rollback_needed == 'true'
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        echo "🔄 Initiating AUTO-ROLLBACK to previous stable version..."
        
        cat << EOF > rollback_email.txt
        From: DevOps AI Pipeline <${EMAIL_USER}>
        To: amenichokri2002@gmail.com
        Subject: [URGENT] Auto-Rollback Executed - High Risk Detected
        MIME-Version: 1.0
        Content-Type: text/html; charset=utf-8
        
        <html>
        <body style="font-family: Arial, sans-serif;">
        <h2 style="color: red;">🚨 AUTO-ROLLBACK EXECUTED 🚨</h2>
        <hr>
        <p><strong>The AI DevOps pipeline has automatically rolled back the deployment due to high risk detection.</strong></p>
        
        <h3>📊 Rollback Details:</h3>
        <ul>
          <li><strong>Timestamp:</strong> $(date)</li>
          <li><strong>Commit SHA:</strong> ${{ github.sha }}</li>
          <li><strong>Author:</strong> ${{ github.actor }}</li>
          <li><strong>Risk Score Trigger:</strong> >90%</li>
        </ul>
        
        <h3>🔧 Action Taken:</h3>
        <ul>
          <li>✅ New deployment was stopped/rolled back</li>
          <li>✅ Previous stable version is now active</li>
          <li>✅ Team has been notified</li>
        </ul>
        
        <p><strong>Please investigate the root cause before attempting another deployment.</strong></p>
        <hr>
        <p><small>This is an automated rollback notification from your AI DevOps Pipeline.</small></p>
        </body>
        </html>
        EOF
        
        curl --ssl-reqd \
          --url 'smtps://smtp.gmail.com:465' \
          --user "${EMAIL_USER}:${EMAIL_PASSWORD}" \
          --mail-from "${EMAIL_USER}" \
          --mail-rcpt "amenichokri2002@gmail.com" \
          --upload-file rollback_email.txt
        
        kubectl rollout undo deployment/sfe-devops-app
        kubectl rollout status deployment/sfe-devops-app --timeout=120s
        
        echo "✅ Auto-rollback completed. Previous version is now active."
        exit 1
      
    - name: Debug if failed
      if: failure()
      run: |
        echo "🔍 Debugging failed deployment..."
        echo "=== ALL PODS ==="
        kubectl get pods
        echo "=== POD DESCRIPTIONS ==="
        kubectl describe pods
        echo "=== APP LOGS ==="
        kubectl logs -l app=sfe-devops-app --tail=50 || echo "No app logs yet"
        echo "=== AI LOGS ==="
        kubectl logs -l app=ai-anomaly-detection --tail=50 || echo "No AI logs yet"
      
    - name: Test Application
      if: success()
      run: |
        echo "⏳ Waiting for pods to be ready..."
        kubectl wait --for=condition=ready pod -l app=sfe-devops-app --timeout=120s || true
        kubectl wait --for=condition=ready pod -l app=ai-anomaly-detection --timeout=120s || true
        
        echo "🔌 Setting up port-forward for app..."
        kubectl port-forward service/sfe-devops-app-service 8080:80 &
        PF_PID=$!
        sleep 10
        
        echo "🔍 Testing /health endpoint..."
        curl -s http://localhost:8080/health || echo "⚠️ Health endpoint failed"
        
        echo -e "\n\n🔍 Testing / endpoint..."
        curl -s http://localhost:8080/ || echo "⚠️ Root endpoint failed"
        
        kill $PF_PID 2>/dev/null || true
        
        echo -e "\n\n✅ Deployment validation completed successfully!"