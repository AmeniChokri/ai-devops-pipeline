apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-anomaly-detection
  namespace: default
  labels:
    app: ai-anomaly-detection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-anomaly-detection
  template:
    metadata:
      labels:
        app: ai-anomaly-detection
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: ai-service
        image: ghcr.io/amenichokri/ai-devops-pipeline-ai:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_PATH
          value: "/app/models/isolation_forest_model.pkl"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-anomaly-detection-service
  namespace: default
  labels:
    app: ai-anomaly-detection
spec:
  selector:
    app: ai-anomaly-detection
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP